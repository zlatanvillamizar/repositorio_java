<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin · Conciertos Conectados</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- HEADER -->
        <header class="app-header" id="adminHeader" style="display:none;">
            <div class="logo">
                <i class="fas fa-ticket-alt"></i> Admin · Conciertos
            </div>
            <div class="nav-links">
                <a href="index.html" class="admin-btn">
                    <i class="fas fa-home"></i> Ver sitio
                </a>
                <a href="#" class="btn-logout" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Cerrar sesión
                </a>
            </div>
        </header>

        <!-- PANEL ADMIN -->
        <div class="admin-panel" id="adminPanel" style="display:none;">
            <div class="admin-tabs">
                <button class="active" data-tab="categorias">
                    <i class="fas fa-tags"></i> Categorías
                </button>
                <button data-tab="eventos">
                    <i class="fas fa-calendar-alt"></i> Eventos
                </button>
                <button data-tab="ventas">
                    <i class="fas fa-shopping-cart"></i> Ventas
                </button>
                <button data-tab="reporte">
                    <i class="fas fa-chart-bar"></i> Reportes
                </button>
            </div>
            
            <!-- ✅ BOTONES DE EXPORTAR/IMPORTAR -->
            <div id="exportImportButtons" style="display:flex;gap:0.5rem;flex-wrap:wrap;margin:1rem 0;padding:0 0.5rem;">
                <button onclick="exportarVentas()" 
                        style="background:linear-gradient(135deg,#2e7d32,#43a047);color:white;border:none;padding:0.5rem 1.2rem;border-radius:40px;cursor:pointer;font-weight:600;font-size:0.85rem;">
                    <i class="fas fa-download"></i> Exportar Ventas
                </button>
                <button onclick="importarVentas()" 
                        style="background:linear-gradient(135deg,#6a1b4d,#9f3b7a);color:white;border:none;padding:0.5rem 1.2rem;border-radius:40px;cursor:pointer;font-weight:600;font-size:0.85rem;">
                    <i class="fas fa-upload"></i> Importar Ventas
                </button>
                <button onclick="verVentasEnConsola()" 
                        style="background:rgba(212,175,55,0.8);color:white;border:none;padding:0.5rem 1.2rem;border-radius:40px;cursor:pointer;font-weight:600;font-size:0.85rem;">
                    <i class="fas fa-terminal"></i> Ver en Consola
                </button>
            </div>
            
            <div id="adminContent"></div>
        </div>

        <!-- LOGIN -->
        <div id="loginContainer" style="display:none;">
            <div class="login-container">
                <h1><i class="fas fa-ticket-alt"></i> Admin</h1>
                <p class="subtitle">Conciertos Conectados</p>
                <img src="img/melanie-login.jpg" alt="Melanie" class="login-img" 
                     onerror="this.src='https://via.placeholder.com/120/6a1b4d/fff?text=🎵'">
                <form id="loginForm">
                    <input type="email" id="loginEmail" placeholder="Email" value="admin@mail.com">
                    <input type="password" id="loginPassword" placeholder="Contraseña" value="123456">
                    <button type="submit"><i class="fas fa-sign-in-alt"></i> Iniciar sesión</button>
                    <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
                </form>
            </div>
        </div>
    </div>

    <!-- IMÁGENES OCULTAS -->
    <div style="display:none;">
        <img id="img-login" src="img/melanie-login.jpg" alt="Login">
        <img id="img-fondo" src="img/fondopaginamel.jpg" alt="Fondo">
        <img id="img-crybaby" src="img/crybabytour.jpg" alt="Cry Baby">
        <img id="img-k12" src="img/melconciertoK-12.jpg" alt="K-12">
        <img id="img-portals" src="img/possesion.jpg" alt="Portals">
        <img id="img-hades" src="img/Hadesmelanie.jpg" alt="Hades">
        <img id="img-afterschool" src="img/otravezhades.jpg" alt="After School">
        <img id="img-saltsdom" src="img/thecreature.jpg" alt="Salts Dom">
    </div>

    <!-- ============================================================ -->
    <!-- SCRIPTS - ORDEN CORRECTO (SIN DUPLICADOS)                    -->
    <!-- ============================================================ -->
    <script src="js/storage.js"></script>
    <script src="js/dataset.js"></script>
    <script src="js/exportImport.js"></script>  <!-- ✅ Primero las funciones -->
    <script src="js/admin.js"></script>         <!-- ✅ Después la lógica -->
</body>
</html>
